<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CareerFlow</title>
    <link rel="stylesheet" href="/css/auth.css">
    <link rel="icon" type="image/svg+xml" href="/images/careerflow-icon.svg">
</head>

<body class="auth-page">

    <a href="/index.html" class="auth-back-link">← Back to home</a>

    <div class="auth-card">

        <div class="auth-card__header">
            <div class="auth-card__logo">
                <img src="images/careerflow-icon.svg" alt="CareerFlow logo" class="auth-card__logo-image">
                <span class="auth-card__logo-text">CareerFlow</span>
            </div>
            <h1 class="auth-card__title">Welcome back</h1>
            <p class="auth-card__subtitle">Sign in to continue tracking your applications</p>
        </div>

        <div class="auth-card__body">

            <form class="form" id="loginForm" action="/login" method="POST">

                <div class="form__group">
                    <label class="form__label" for="email">
                        <i class="ti ti-mail" aria-hidden="true"></i>
                        Email address
                    </label>
                    <input
                        class="form__input"
                        type="email"
                        id="email"
                        name="email"
                        placeholder="Enter your email"
                    >
                    <div class="form__error" id="emailError"></div>
                </div>

                <div class="form__group">
                    <label class="form__label" for="password">
                        <i class="ti ti-lock" aria-hidden="true"></i>
                        Password
                    </label>
                    <input
                        class="form__input"
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Enter your password"
                    >
                    <div class="form__error" id="passwordError"></div>
                </div>

                <div class="form__forgot">
                    <a href="#" class="form__forgot-link">Forgot password?</a>
                </div>

                <button class="button button--full" type="submit">Sign in</button>

            </form>

            <div class="auth-card__divider">
                <span class="auth-card__divider-line"></span>
                <span class="auth-card__divider-text">or</span>
                <span class="auth-card__divider-line"></span>
            </div>

            <div class="auth-card__footer">
                <span>No account? <a class="auth-card__link" href="/register.html">Create one free</a></span>
                <div class="auth-trust">
                    <span class="auth-trust__dot"></span>
                    <span class="auth-trust__text">Free forever — no credit card needed</span>
                </div>
            </div>

        </div>

    </div>

    <script src="/js/login.js"></script>
</body>
</html>
