<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <style>
      .bar { fill: #e8effe; }
      .arrow { fill: none; stroke: #e8effe; stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="120" height="120" rx="24" fill="#1a35a0"/>

  <!-- Chart bars -->
  <rect x="18" y="80" width="16" height="24" rx="4" class="bar" opacity="0.45"/>
  <rect x="40" y="62" width="16" height="42" rx="4" class="bar" opacity="0.65"/>
  <rect x="62" y="44" width="16" height="60" rx="4" class="bar" opacity="0.85"/>
  <rect x="84" y="28" width="16" height="76" rx="4" class="bar"/>

  <!-- Upward trend arrow -->
  <polyline points="18,76 40,58 62,40 84,24" class="arrow"/>
  <polyline points="74,22 84,22 84,32" class="arrow"/>

  <!-- CF monogram bottom right -->
  <text x="14" y="115" font-size="11" font-weight="600" font-family="'Segoe UI', system-ui, sans-serif" fill="rgba(168,190,245,0.6)" letter-spacing="1">CAREERFLOW</text>
</svg>
